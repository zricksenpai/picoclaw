name: Build-Picoclaw-For-Pi3
on: [push, workflow_dispatch]

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Dùng bản ổn định để tránh lỗi v1.25

      - name: Build Picoclaw Binary
        run: |
          # Lệnh build chính xác theo cấu trúc của dự án
          GOOS=linux GOARCH=arm64 go build -v -o picoclaw_arm64 ./cmd/picoclaw/main.go

      - name: Save Result
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-binary-file
          path: picoclaw_arm64
